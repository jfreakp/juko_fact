services:
  postgres:
    image: postgres:16-alpine
    container_name: jukofact_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jukofact
      POSTGRES_PASSWORD: jukofact_pass
      POSTGRES_DB: jukofact
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jukofact -d jukofact"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
